name: Validate Links (Daily)

on:
  schedule:
    # Every day at 6:00 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  validate-links:
    name: Check All Tool Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Tool Links
        id: validate
        run: |
          node -e "
          const https = require('https');
          const http = require('http');
          const fs = require('fs');
          const { URL } = require('url');

          const tools = JSON.parse(fs.readFileSync('data/tools.json', 'utf8'));
          const brokenLinks = [];
          const results = [];

          async function checkUrl(url) {
            return new Promise((resolve) => {
              try {
                const parsedUrl = new URL(url);
                const client = parsedUrl.protocol === 'https:' ? https : http;
                const options = {
                  hostname: parsedUrl.hostname,
                  path: parsedUrl.pathname + parsedUrl.search,
                  method: 'HEAD',
                  headers: { 'User-Agent': 'awesome-ai-tools-bot/1.0' },
                  timeout: 10000
                };
                const req = client.request(options, (res) => {
                  resolve({ ok: res.statusCode < 400, status: res.statusCode });
                });
                req.on('error', (e) => resolve({ ok: false, error: e.message }));
                req.on('timeout', () => {
                  req.destroy();
                  resolve({ ok: false, error: 'timeout' });
                });
                req.end();
              } catch (e) {
                resolve({ ok: false, error: e.message });
              }
            });
          }

          async function validateAll() {
            for (const tool of tools) {
              process.stdout.write('Checking ' + tool.name + '...');
              const result = await checkUrl(tool.url);
              if (!result.ok) {
                brokenLinks.push({
                  name: tool.name,
                  url: tool.url,
                  error: result.error || 'HTTP ' + result.status
                });
                console.log(' ❌ ' + (result.error || 'HTTP ' + result.status));
              } else {
                console.log(' ✅');
              }
              // Throttle to avoid rate limiting
              await new Promise(r => setTimeout(r, 500));
            }

            if (brokenLinks.length > 0) {
              fs.writeFileSync('/tmp/broken-links.json', JSON.stringify(brokenLinks, null, 2));
              console.log('\n\nBroken links found: ' + brokenLinks.length);
              brokenLinks.forEach(l => console.log('  - ' + l.name + ': ' + l.url + ' (' + l.error + ')'));
              process.exit(1);
            } else {
              console.log('\n✅ All ' + tools.length + ' tool links are valid!');
            }
          }

          validateAll().catch(e => { console.error(e); process.exit(1); });
          "

      - name: Create Issue for Broken Links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let brokenLinks = [];
            try {
              brokenLinks = JSON.parse(fs.readFileSync('/tmp/broken-links.json', 'utf8'));
            } catch (e) {
              console.log('Could not read broken links file');
              return;
            }

            const body = `## 🔗 Broken Links Detected

            The daily link validation found **${brokenLinks.length}** broken link(s):

            ${brokenLinks.map(l => `- **${l.name}**: \`${l.url}\` — ${l.error}`).join('\n')}

            Please fix or remove these links.

            *Auto-generated by the daily link validation workflow on ${new Date().toISOString().split('T')[0]}*`;

            // Check if a similar issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'broken-link'
            });

            const existingIssue = issues.data.find(i => i.title.startsWith('[Broken Links]'));

            if (existingIssue) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '[Broken Links] Daily validation - ' + new Date().toISOString().split('T')[0],
                body: body,
                labels: ['broken-link', 'automated']
              });
            }
