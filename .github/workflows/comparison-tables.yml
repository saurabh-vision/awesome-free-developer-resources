name: Generate Comparison Tables

on:
  schedule:
    # Every Sunday at 10:00 AM UTC
    - cron: '0 10 * * 0'
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to generate comparisons for (e.g., api-testing, hosting)'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-comparisons:
    name: Auto-Generate Tool Comparison Tables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Comparison Tables
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TARGET_CATEGORY: ${{ github.event.inputs.category || 'all' }}
        run: |
          node scripts/generate-comparisons.js

      - name: Check for Changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Create Pull Request with New Comparisons
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const branch = 'auto/comparison-update-' + new Date().toISOString().split('T')[0];

            execSync('git config --local user.email "github-actions[bot]@users.noreply.github.com"');
            execSync('git config --local user.name "github-actions[bot]"');
            execSync(`git checkout -b ${branch}`);
            execSync('git add .');
            execSync('git commit -m "feat: auto-update comparison tables"');
            execSync(`git push origin ${branch}`);

            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🤖 Auto: Update Tool Comparison Tables',
              body: `## Automated Comparison Table Update

            This PR was automatically generated to update tool comparison tables.

            ### Changes:
            - Updated comparison tables in README.md
            - Based on latest tools in \`data/tools.json\`

            *Auto-generated by the comparison tables workflow*`,
              head: branch,
              base: 'main',
              labels: ['automated', 'comparisons']
            });
