name: AI Description Generator

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'data/tools.json'
  workflow_dispatch:
    inputs:
      tool_name:
        description: 'Tool name to regenerate description for'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-descriptions:
    name: Auto-Generate Missing Descriptions
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.title, 'Add')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for Missing Descriptions
        id: check
        run: |
          node -e "
          const fs = require('fs');
          const tools = JSON.parse(fs.readFileSync('data/tools.json', 'utf8'));
          const missing = tools.filter(t => !t.description || t.description.length < 20);
          console.log('Tools missing descriptions: ' + missing.length);
          if (missing.length > 0) {
            console.log(missing.map(t => t.name).join(', '));
            fs.writeFileSync('/tmp/missing-descriptions.json', JSON.stringify(missing));
          }
          process.exit(missing.length > 0 ? 1 : 0);
          "
        continue-on-error: true

      - name: Generate Descriptions with AI (if OPENAI_API_KEY is set)
        if: steps.check.outcome == 'failure' && env.OPENAI_API_KEY != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/generate-descriptions.js

      - name: Validate Tool Entries
        run: |
          node scripts/validate-tools.js

      - name: Comment on PR with Validation Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let validationResults = 'No validation issues found ✅';

            try {
              validationResults = fs.readFileSync('/tmp/validation-results.md', 'utf8');
            } catch (e) {
              // No validation results file
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI Tools Validation Results\n\n${validationResults}\n\n*Auto-generated by the AI description generator workflow*`
            });

      - name: Commit Updated Descriptions
        if: steps.check.outcome == 'failure'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tools.json
          git diff --staged --quiet || git commit -m "chore: auto-generate missing tool descriptions [skip ci]"
          git push
